{% extends "base.html" %}
{% block title %}Create Agent — Tain Agent Framework{% endblock %}

{% block content %}
<div class="p-6 max-w-xl">
    <h1 class="text-display-lg text-ink mb-1" style="font-family: 'SF Pro Rounded', 'Nunito', system-ui, -apple-system, sans-serif;">Create New Agent</h1>
    <p class="text-sm text-mute mb-8">Create a new agent instance</p>

    <form id="create-form" class="space-y-4">
        <div class="bg-canvas rounded-lg border border-hairline p-5">
            <label class="block text-sm font-medium text-ink mb-2">Agent Name</label>
            <input type="text" name="name" required pattern="[a-zA-Z][a-zA-Z0-9_-]{0,31}"
                   placeholder="e.g. poet"
                   class="input-field">
            <p class="text-xs text-mute mt-1.5">Letters (A-Z, a-z), digits, hyphens, underscores. 1-32 chars. Must start with a letter.</p>
        </div>

        <div class="bg-canvas rounded-lg border border-hairline p-5">
            <label class="block text-sm font-medium text-ink mb-3">Evolution Mode</label>
            <div class="space-y-2">
                <label class="flex items-center gap-2 text-sm text-body cursor-pointer">
                    <input type="radio" name="mode" value="chaos" checked class="accent-ink">
                    Chaos — blank personality, self-awakening
                </label>
                <label class="flex items-center gap-2 text-sm text-body cursor-pointer">
                    <input type="radio" name="mode" value="specified" class="accent-ink">
                    Specified — preset role and personality traits
                </label>
            </div>
        </div>

        <div id="role-fields" style="display:none" class="bg-canvas rounded-lg border border-hairline p-5 space-y-4">
            <div>
                <label class="block text-sm font-medium text-ink mb-1">Role Name</label>
                <input type="text" name="role" placeholder="e.g. Romantic Poet"
                       class="input-field">
            </div>
            <div>
                <label class="block text-sm font-medium text-ink mb-1">Role Description</label>
                <textarea name="role_description" rows="3" placeholder="Describe the agent's personality and role..."
                          class="input-field rounded-lg !rounded-lg"></textarea>
            </div>
        </div>

        <button type="submit"
                class="btn-primary w-full">
            Create Agent
        </button>
    </form>

    <div id="create-result" class="mt-4"></div>

    <script>
    document.getElementById('create-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        var fd = new FormData(this);
        var data = Object.fromEntries(fd);
        var el = document.getElementById('create-result');
        try {
            var resp = await fetch('/api/agents/create', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data),
            });
            var result = await resp.json();
            if (resp.ok) {
                el.innerHTML = '<div class="bg-canvas-soft border border-hairline rounded-lg p-4 text-ink">Agent <strong>' + result.name + '</strong> created successfully. <a href="/agent/' + result.name + '" class="underline">View agent →</a></div>';
            } else {
                let detail = result.detail || 'Unknown error';
                if (resp.status === 429) detail = '请求过于频繁，请稍候重试';
                else if (resp.status === 409) detail = 'Agent 名称已存在';
                el.innerHTML = '<div class="alert-error rounded-lg p-4">' + detail + '</div>';
            }
        } catch(err) {
            let msg = err.message || 'Unknown error';
            if (msg.includes('429') || msg.includes('Too Many Requests')) msg = '请求过于频繁，请稍候重试';
            else if (msg.includes('404')) msg = 'Agent 未找到';
            else if (msg.includes('500') || msg.includes('Internal Server Error')) msg = '服务器内部错误，请检查日志';
            el.innerHTML = '<div class="alert-error rounded-lg p-4">Error: ' + msg + '</div>';
        }
    });

    document.querySelectorAll('input[name="mode"]').forEach(function(r) {
        r.addEventListener('change', function() {
            document.getElementById('role-fields').style.display =
                document.querySelector('input[name="mode"]:checked').value === 'specified' ? 'block' : 'none';
        });
    });
    </script>
</div>
{% endblock %}
