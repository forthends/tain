<!-- Chat Tab -->
<div x-data="chatApp('{{ agent.name }}')" class="max-w-3xl">
    <div class="bg-white rounded-xl border border-gray-200 shadow-sm">
        <!-- Messages area -->
        <div id="chat-messages" class="p-4 h-96 overflow-y-auto space-y-3" x-ref="messages">
            <template x-for="msg in messages" :key="msg.message_id">
                <div :class="msg.from_agent === 'web_user' ? 'flex justify-end' : 'flex justify-start'">
                    <div :class="msg.from_agent === 'web_user' ? 'message-human' : 'message-agent'"
                         class="max-w-[80%] px-4 py-2 text-sm">
                        <p x-text="msg.from_agent === 'web_user' ? 'You' : '{{ agent.name }}'"
                           class="text-xs text-gray-400 mb-1"></p>
                        <div class="whitespace-pre-wrap" x-text="msg.content"></div>
                        <p class="text-xs text-gray-400 mt-1" x-text="msg.timestamp?.slice(11, 16) || ''"></p>
                    </div>
                </div>
            </template>
            <!-- Streaming message -->
            <div x-show="streaming" class="flex justify-start">
                <div class="message-agent max-w-[80%] px-4 py-2 text-sm">
                    <p class="text-xs text-gray-400 mb-1">{{ agent.name }}</p>
                    <div class="whitespace-pre-wrap" x-text="streamText"></div>
                    <span class="inline-block w-2 h-4 bg-blue-500 animate-pulse ml-0.5 align-text-bottom"></span>
                </div>
            </div>
            <!-- Tool indicator -->
            <div x-show="toolName" class="flex justify-start">
                <div class="bg-amber-50 border border-amber-200 rounded-lg px-3 py-1.5 text-xs text-amber-700">
                    <span x-text="'🔧 ' + toolName + (toolInput ? ' (' + toolInput + ')' : '')"></span>
                </div>
            </div>
        </div>

        <!-- Input area -->
        <div class="border-t border-gray-200 p-3">
            <form @submit.prevent="sendMessage" class="flex gap-2">
                <input type="text" x-model="input" placeholder="Type your message..."
                       class="flex-1 px-4 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none"
                       :disabled="streaming">
                <button type="submit"
                        class="px-4 py-2 bg-blue-500 text-white text-sm rounded-lg hover:bg-blue-600 transition-colors disabled:opacity-50"
                        :disabled="streaming || !input.trim()">
                    Send
                </button>
            </form>
        </div>
    </div>

    <p class="text-xs text-gray-400 mt-2">
        {% if agent.status == 'running' %}
        Agent is running — messages are processed in real time.
        {% else %}
        Agent is stopped — messages use stored personality and tools. Start the agent daemon for autonomous evolution.
        {% endif %}
    </p>
</div>

<script>
function chatApp(agentName) {
    return {
        messages: [],
        input: '',
        streaming: false,
        streamText: '',
        toolName: '',
        toolInput: '',
        eventSource: null,

        async init() {
            // Load history
            try {
                const resp = await fetch(`/api/agent/${agentName}/chat/history`);
                const data = await resp.json();
                this.messages = data.messages || [];
                this.$nextTick(() => {
                    this.$refs.messages.scrollTop = this.$refs.messages.scrollHeight;
                });
            } catch (e) {
                console.error('Failed to load chat history:', e);
            }
        },

        async sendMessage() {
            if (!this.input.trim() || this.streaming) return;
            const content = this.input.trim();
            this.input = '';
            this.streaming = true;
            this.streamText = '';
            this.toolName = '';
            this.toolInput = '';

            // Add user message immediately
            this.messages.push({
                message_id: 'local_' + Date.now(),
                from_agent: 'web_user',
                to_agent: agentName,
                content: content,
                timestamp: new Date().toISOString(),
                message_type: 'chat',
            });
            this.$nextTick(() => {
                this.$refs.messages.scrollTop = this.$refs.messages.scrollHeight;
            });

            try {
                const resp = await fetch(`/api/agent/${agentName}/chat`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({content}),
                });
                const reader = resp.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                while (true) {
                    const {done, value} = await reader.read();
                    if (done) break;
                    buffer += decoder.decode(value, {stream: true});
                    const lines = buffer.split('\n');
                    buffer = lines.pop() || '';
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(line.slice(6));
                                if (data.text) {
                                    this.streamText += data.text;
                                } else if (data.tool_name) {
                                    this.toolName = data.tool_name;
                                    this.toolInput = data.tool_input || '';
                                } else if (data.tool_done) {
                                    this.toolName = '';
                                    this.toolInput = '';
                                } else if (data.done) {
                                    this.messages.push({
                                        message_id: data.message_id,
                                        from_agent: agentName,
                                        to_agent: 'web_user',
                                        content: this.streamText,
                                        timestamp: new Date().toISOString(),
                                        message_type: 'chat',
                                    });
                                    this.streamText = '';
                                }
                            } catch (e) {}
                        }
                    }
                    this.$nextTick(() => {
                        this.$refs.messages.scrollTop = this.$refs.messages.scrollHeight;
                    });
                }
            } catch (e) {
                console.error('Chat error:', e);
                this.streamText += '\n[Connection error]';
            }
            this.streaming = false;
        }
    };
}
</script>
