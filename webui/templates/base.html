<!DOCTYPE html>
<html lang="zh-CN" x-data="theme" :class="{ 'dark': dark }">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Tain Agent Framework{% endblock %}</title>
    <link rel="stylesheet" href="/static/tailwind.css">
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.5/dist/cdn.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked@11.2.0/lib/marked.umd.min.js"></script>
    <style>
        .status-dot { width: 8px; height: 8px; border-radius: 9999px; display: inline-block; }
        .status-running { background-color: #22c55e; box-shadow: 0 0 6px #22c55e; }
        .status-stopped { background-color: #a3a3a3; }
        .dark .status-stopped { background-color: #525252; }
        pre.code-block {
            background: var(--color-ink);
            color: var(--color-on-dark);
            padding: 1rem; border-radius: 12px; overflow-x: auto;
            font-size: 0.875rem;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        }
        .message-human { border-radius: 16px 16px 4px 16px; }
        .message-agent { border-radius: 16px 16px 16px 4px; }
        .markdown-body { line-height: 1.6; }
        .markdown-body h1 { font-size: 1.25em; font-weight: 600; margin: 0.75em 0 0.5em; }
        .markdown-body h2 { font-size: 1.15em; font-weight: 600; margin: 0.75em 0 0.5em; }
        .markdown-body h3 { font-size: 1.05em; font-weight: 600; margin: 0.75em 0 0.5em; }
        .markdown-body p { margin: 0.5em 0; }
        .markdown-body ul, .markdown-body ol { padding-left: 1.5em; margin: 0.5em 0; }
        .markdown-body li { margin: 0.25em 0; }
        .markdown-body ul li { list-style-type: disc; }
        .markdown-body ol li { list-style-type: decimal; }
        .markdown-body code { padding: 0.15em 0.4em; border-radius: 6px; font-size: 0.9em; font-family: ui-monospace, SFMono-Regular, monospace; }
        .markdown-body pre { padding: 0.75rem 1rem; border-radius: 12px; overflow-x: auto; margin: 0.75em 0; font-size: 0.875rem; }
        .markdown-body pre code { background: none; padding: 0; font-size: inherit; }
        .markdown-body blockquote { padding-left: 0.75em; margin: 0.5em 0; }
        .markdown-body a { text-decoration: underline; }
        .markdown-body strong { font-weight: 600; }
        .markdown-body em { font-style: italic; }
        .markdown-body hr { border: none; margin: 1em 0; }
    </style>
</head>
<body class="bg-canvas text-ink antialiased">
    <div class="flex h-screen">
        <!-- Sidebar — light monochrome, hairline border -->
        <aside class="w-64 bg-canvas border-r border-hairline flex flex-col flex-shrink-0">
            <div class="px-4 py-4 border-b border-hairline">
                <a href="/" class="text-lg font-semibold tracking-tight text-ink hover:text-charcoal transition-colors" style="font-family: 'SF Pro Rounded', 'Nunito', system-ui, -apple-system, sans-serif;">
                    Tain Agent
                </a>
                <div class="text-xs text-mute mt-0.5">Tao Framework</div>
            </div>

            <nav class="flex-1 overflow-y-auto sidebar-scrollbar p-3">
                <div class="text-xs font-semibold text-mute uppercase tracking-wider mb-2 px-2">Agents</div>
                <div id="sidebar-agents"
                     hx-get="/sidebar/agents?current={{ agent.name if agent else '' }}"
                     hx-trigger="agentStatusChanged from:body"
                     hx-swap="innerHTML">
                    {% include "components/sidebar_agents.html" %}
                </div>

                <div class="mt-3 pt-3 border-t border-hairline">
                    <a href="/create" class="block px-3 py-2 rounded-full text-sm text-ink hover:bg-canvas-soft transition-colors">
                        + Create Agent
                    </a>
                </div>
            </nav>

            <div class="p-3 border-t border-hairline">
                <div class="text-xs text-mute space-y-1">
                    <div>v{{ framework_version }} &middot; {{ llm_provider }}/{{ llm_model }}</div>
                    <div class="flex items-center justify-between">
                        <a href="/settings" class="text-ink hover:text-charcoal transition-colors">Settings</a>
                        <button @click="toggle()" class="text-mute hover:text-ink transition-colors p-0.5 rounded-full" title="Toggle theme">
                            <svg x-show="!dark" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
                            </svg>
                            <svg x-show="dark" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main content -->
        <main class="flex-1 flex flex-col overflow-hidden bg-canvas">
            {% block content %}{% endblock %}
        </main>
    </div>

    <!-- Toast container -->
    <div id="toast" class="fixed top-4 right-4 z-50" x-data></div>

    <!-- HTMX loading bar -->
    <div id="htmx-loading-bar"></div>

    <!-- Theme management -->
    <script>
    document.addEventListener('alpine:init', () => {
        Alpine.data('theme', () => ({
            dark: false,
            init() {
                const stored = localStorage.getItem('theme');
                if (stored === 'dark' || (!stored && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                    this.dark = true;
                }
                window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
                    if (!localStorage.getItem('theme')) {
                        this.dark = e.matches;
                    }
                });
            },
            toggle() {
                this.dark = !this.dark;
                localStorage.setItem('theme', this.dark ? 'dark' : 'light');
            }
        }));
    });

    // HTMX loading bar
    document.addEventListener('htmx:beforeRequest', () => {
        const bar = document.getElementById('htmx-loading-bar');
        if (bar) { bar.style.width = '60%'; bar.classList.add('active'); bar.classList.remove('done'); }
    });
    document.addEventListener('htmx:afterRequest', () => {
        const bar = document.getElementById('htmx-loading-bar');
        if (bar) { bar.style.width = '100%'; bar.classList.add('done'); }
    });
    </script>
</body>
</html>
