<div id="agent-controls" class="flex items-center gap-2">
    <span class="text-sm text-body mr-2">
        <span class="status-dot {{ 'status-running' if agent.status == 'running' else 'status-stopped' }} mr-1"></span>
        {{ agent.status }}
    </span>
    {% if agent.status == 'running' %}
    <button hx-post="/agent/{{ agent.name }}/controls/stop"
            hx-target="#agent-controls" hx-swap="outerHTML"
            class="btn-secondary border-[#ef4444] text-[#ef4444] hover:bg-[#fef2f2]">
        Stop
    </button>
    <button hx-post="/agent/{{ agent.name }}/controls/restart"
            hx-target="#agent-controls" hx-swap="outerHTML"
            class="btn-secondary">
        Restart
    </button>
    {% else %}
    <button hx-post="/agent/{{ agent.name }}/controls/start"
            hx-target="#agent-controls" hx-swap="outerHTML"
            class="btn-primary">
        Start
    </button>
    {% endif %}
</div>
